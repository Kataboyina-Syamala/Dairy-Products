{% extends 'base.html' %}
{% block title %}Login - Smart Dairy{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-success"><i class="fa fa-user-circle"></i> Welcome Back</h3>
                <form action="{{ url_for('auth_bp.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">Login</button>
                </form>
                <div class="text-center mt-3">
                    <p class="text-muted">Don't have an account? <a href="{{ url_for('auth_bp.register') }}" class="text-success text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

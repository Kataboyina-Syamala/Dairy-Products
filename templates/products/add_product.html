{% extends 'base.html' %}
{% block title %}Add Product - Smart Dairy{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-body p-4">
                <h3 class="mb-4 text-success"><i class="fa fa-plus-circle"></i> Add New Product</h3>
                <form action="{{ url_for('products_bp.add_product') }}" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Price ($)</label>
                            <input type="number" step="0.01" class="form-control" name="price" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Initial Stock</label>
                            <input type="number" class="form-control" name="stock" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Image URL (Optional)</label>
                        <input type="url" class="form-control" name="image" placeholder="https://example.com/image.jpg">
                    </div>
                    <button type="submit" class="btn btn-success"><i class="fa fa-save"></i> Save Product</button>
                    <a href="{{ url_for('products_bp.catalog') }}" class="btn btn-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
